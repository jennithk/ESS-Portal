<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ESS Portal | HR Dashboard</title>

    <link rel="stylesheet" href="../css/globals.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/hr-dashboard.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <aside class="sidebar">

        <div class="logo">
            <h2>ESS Portal HR</h2>
        </div>

        <ul class="menu">

            <li class="active">
                <a href="hr-dashboard.html">
                    <i class="fa-solid fa-chart-line"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="hr-leaves.html">
                    <i class="fa-solid fa-file-circle-check"></i>
                    Leave Requests
                </a>
            </li>

            <li>
                <a href="hr-payroll.html">
                    <i class="fa-solid fa-wallet"></i>
                    Payroll
                </a>
            </li>

            <li>
                <a href="hr-performance.html">
                    <i class="fa-solid fa-chart-column"></i>
                    Performance
                </a>
            </li>

            <li>
                <a href="hr-training.html">
                    <i class="fa-solid fa-graduation-cap"></i>
                    Training
                </a>
            </li>

            <li>
                <a href="hr-notifications.html">
                    <i class="fa-solid fa-bell"></i>
                    Notifications
                </a>
            </li>

        </ul>

        <button id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </button>

    </aside>

    <main class="main-content">

        <header class="topbar">

            <div>
                <h1>HR Dashboard</h1>
                <p>Employee Management System</p>
            </div>

        </header>

        <section class="stats">

            <div class="stat-card">
                <h3>Total Employees</h3>
                <h2 id="employeeCount">0</h2>
            </div>

            <div class="stat-card">
                <h3>Departments</h3>
                <h2 id="departmentCount">0</h2>
            </div>

            <div class="stat-card">
                <h3>Pending Leaves</h3>
                <h2 id="pendingLeaves">0</h2>
            </div>

            <div class="stat-card">
                <h3>Payroll Records</h3>
                <h2 id="payrollCount">0</h2>
            </div>

        </section>

        <section class="employee-table">

            <h2>Employees</h2>

            <table>

                <thead>

                    <tr>
                        <th>Employee ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Designation</th>
                        <th>Status</th>
                    </tr>

                </thead>

                <tbody id="employeeTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="../js/api.js"></script>
<script src="../js/hr-dashboard.js"></script>

</body>

</html>
