<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ESS Portal | Admin Analytics</title>

    <link rel="stylesheet" href="../css/globals.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/admin-dashboard.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <aside class="sidebar">

        <div class="logo">
            <h2>ESS Admin</h2>
        </div>

        <ul class="menu">

            <li>
                <a href="admin-dashboard.html">
                    <i class="fa-solid fa-chart-pie"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="admin-users.html">
                    <i class="fa-solid fa-users"></i>
                    Users
                </a>
            </li>

            <li class="active">
                <a href="admin-analytics.html">
                    <i class="fa-solid fa-chart-line"></i>
                    Analytics
                </a>
            </li>

        </ul>

        <button id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </button>

    </aside>

    <main class="main-content">

        <header class="topbar">

            <div>

                <h1>Analytics</h1>

                <p>System Statistics</p>

            </div>

        </header>

        <section class="stats">

            <div class="stat-card">
                <h3>Total Employees</h3>
                <h2 id="employees">0</h2>
            </div>

            <div class="stat-card">
                <h3>Total HR</h3>
                <h2 id="hrs">0</h2>
            </div>

            <div class="stat-card">
                <h3>Total Admins</h3>
                <h2 id="admins">0</h2>
            </div>

            <div class="stat-card">
                <h3>Active Users</h3>
                <h2 id="activeUsers">0</h2>
            </div>

        </section>

    </main>

</div>

<script src="../js/api.js"></script>
<script src="../js/admin-analytics.js"></script>

</body>

</html>
